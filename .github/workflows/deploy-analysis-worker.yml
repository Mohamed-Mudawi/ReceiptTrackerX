name: Deploy Analysis Worker

on:
  push:
    branches:
      - main
    paths:
      - "analysis_worker/**"
      - ".github/workflows/deploy-analysis-worker.yml"

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Log in to Azure Container Registry
        uses: docker/login-action@v3
        with:
          registry: receipttrackerxacr.azurecr.io
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./analysis_worker
          push: true
          platforms: linux/amd64
          tags: receipttrackerxacr.azurecr.io/analysis-worker:latest

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Azure Container Apps
        uses: azure/container-apps-deploy-action@v2
        with:
          imageToDeploy: receipttrackerxacr.azurecr.io/analysis-worker:latest
          containerAppName: analysis-worker
          resourceGroup: ReceiptTrackerX